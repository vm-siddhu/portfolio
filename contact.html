<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Siddhu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">
</head>

<body>
    <nav class="nav-wrapper">
        <div class="container nav-content">
            <a href="index.html" class="nav-brand scramble-text">SIDDHU</a>
            <div class="nav-status">● AVAILABLE / IN- / 00:00:00</div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Index</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="projects.html" class="nav-link">Work</a></li>
                <li><a href="certificates.html" class="nav-link">Verify</a></li>
                <li><a href="contact.html" class="nav-link active">Talk</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="reveal" style="padding-top: 15rem;">
            <span class="section-label">Connect</span>
            <h1 style="font-size: clamp(3rem, 8vw, 6rem); margin-bottom: 6rem;">Let's Talk.</h1>

            <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 8rem;">
                <div class="contact-info">
                    <p style="font-size: 1.5rem; color: var(--text-primary); margin-bottom: 3rem;">
                        Have a vision you want to bring to life? I'm available for new projects and collaborations.
                    </p>

                    <div style="display: flex; flex-direction: column; gap: 2.5rem;">
                        <a href="mailto:siddhupadala163@gmail.com"
                            style="color: var(--text-secondary); text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; transition: var(--transition-fast);">
                            siddhupadala163@gmail.com
                        </a>
                        <a href="#"
                            style="color: var(--text-secondary); text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; transition: var(--transition-fast);">
                            LinkedIn / vm-siddhu
                        </a>
                        <a href="#"
                            style="color: var(--text-secondary); text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; transition: var(--transition-fast);">
                            Github / vm-siddhu
                        </a>
                    </div>
                </div>

                <div class="contact-form reveal">
                    <form style="display: grid; gap: 2rem;">
                        <div style="display: grid; gap: 0.5rem;">
                            <label
                                style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">Name</label>
                            <input type="text"
                                style="background: transparent; border: none; border-bottom: 1px solid var(--border-color); padding: 1rem 0; color: #fff; font-size: 1.2rem; outline: none; transition: border-color 0.3s;"
                                onfocus="this.style.borderColor='#fff'"
                                onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
                        </div>
                        <div style="display: grid; gap: 0.5rem;">
                            <label
                                style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">Email</label>
                            <input type="email"
                                style="background: transparent; border: none; border-bottom: 1px solid var(--border-color); padding: 1rem 0; color: #fff; font-size: 1.2rem; outline: none; transition: border-color 0.3s;"
                                onfocus="this.style.borderColor='#fff'"
                                onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
                        </div>
                        <div style="display: grid; gap: 0.5rem;">
                            <label
                                style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">Message</label>
                            <textarea rows="4"
                                style="background: transparent; border: none; border-bottom: 1px solid var(--border-color); padding: 1rem 0; color: #fff; font-size: 1.2rem; outline: none; transition: border-color 0.3s; resize: none;"
                                onfocus="this.style.borderColor='#fff'"
                                onblur="this.style.borderColor='rgba(255,255,255,0.08)'"></textarea>
                        </div>
                        <button type="submit" class="btn-premium"
                            style="margin-top: 2rem; padding: 1.5rem 3rem;">Deliver Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
